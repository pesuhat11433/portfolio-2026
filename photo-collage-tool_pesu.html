<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lifestyle Collage Tool</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500;1,600&family=Cormorant+Garamond:ital,wght@0,500;1,500&family=Archivo:wght@500;700;900&family=Space+Grotesk:wght@500;700&family=DM+Serif+Display:ital@0;1&family=Caveat:wght@500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#f7f5f1;
    --panel:#ffffff;
    --ink:#1a1a1a;
    --muted:#9b958d;
    --accent:#1a1a1a;
    --line:#e6e1d8;
    --canvas-bg:#eceae6;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  body{
    font-family:"Archivo", "Noto Sans TC", sans-serif;
    background:var(--bg);
    color:var(--ink);
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    padding:0 0 100px;
  }
  header{
    width:100%;
    max-width:1100px;
    padding:48px 24px 56px;
    border-bottom:1px solid var(--line);
    margin-bottom:48px;
  }
  .header-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    font-size:11px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    color:var(--muted);
    margin-bottom:28px;
  }
  .header-top span:last-child{
    font-style:italic;
    font-family:"Playfair Display", serif;
    text-transform:none;
    letter-spacing:0;
    font-size:13px;
  }
  header h1{
    font-family:"Playfair Display", serif;
    font-size:clamp(40px, 8vw, 72px);
    font-weight:700;
    letter-spacing:-1px;
    line-height:1.05;
  }
  header h1 em{
    font-style:italic;
    font-weight:500;
  }
  header p{
    margin-top:14px;
    color:var(--muted);
    font-size:14px;
    max-width:480px;
    line-height:1.6;
  }
  header p em{
    font-style:italic;
    font-family:"Playfair Display", serif;
  }

  .layout{
    display:flex;
    flex-direction:column;
    gap:32px;
    width:100%;
    max-width:1200px;
    padding:0 24px;
    align-items:flex-start;
  }

  .controls{
    order:2;
    width:100%;
    flex-shrink:0;
    display:flex;
    flex-direction:column;
    gap:0;
  }

  .panel{
    background:transparent;
    border:none;
    border-bottom:1px solid var(--line);
    border-radius:0;
    padding:20px 0;
  }
  .panel:first-child{ padding-top:0; }
  .panel h2{
    font-size:11px;
    text-transform:uppercase;
    letter-spacing:2px;
    color:var(--muted);
    margin-bottom:0;
    font-weight:600;
    display:flex;
    align-items:baseline;
    gap:8px;
    cursor:pointer;
    user-select:none;
    padding:4px 0;
  }
  .panel h2 .num{
    font-family:"Playfair Display", serif;
    font-style:italic;
    font-size:15px;
    color:var(--ink);
    text-transform:none;
    letter-spacing:0;
  }
  .panel h2 .chevron{
    margin-left:auto;
    font-size:14px;
    font-family:"Playfair Display", serif;
    transition:transform .2s;
    color:var(--ink);
  }
  .panel.collapsed h2 .chevron{
    transform:rotate(-90deg);
  }
  .panel-body{
    margin-top:16px;
    overflow:hidden;
  }
  .panel.collapsed .panel-body{
    display:none;
  }

  .upload-zone{
    border:1px solid var(--line);
    border-radius:0;
    padding:20px 12px;
    text-align:center;
    cursor:pointer;
    transition:all .2s;
    font-size:11px;
    letter-spacing:1px;
    text-transform:uppercase;
    color:var(--muted);
    background:var(--panel);
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:6px;
    min-height:64px;
  }
  .upload-zone .plus{
    font-family:"Playfair Display", serif;
    font-size:20px;
    font-style:italic;
    line-height:1;
  }
  .upload-zone:hover{ border-color:var(--ink); color:var(--ink); }
  .upload-zone input{ display:none; }

  .thumbs{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:4px;
    margin-top:12px;
  }
  .thumbs div{
    position:relative;
    aspect-ratio:1;
    border-radius:0;
    overflow:hidden;
    background:#ddd;
  }
  .thumbs img{
    width:100%; height:100%; object-fit:cover; display:block;
    filter:grayscale(15%);
  }
  .thumbs .remove{
    position:absolute; top:2px; right:2px;
    background:rgba(26,26,26,.7);
    color:#fff;
    border:none;
    border-radius:0;
    width:16px; height:16px;
    font-size:10px;
    line-height:16px;
    cursor:pointer;
    padding:0;
  }

  .layout-options{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:8px;
  }
  .layout-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    padding:0;
    border:none;
    border-radius:0;
    background:transparent;
    cursor:pointer;
    transition:all .15s;
    aspect-ratio:1;
  }
  .layout-btn:hover .icon{ border-color:var(--ink); }
  .layout-btn.active .icon{ border-color:var(--ink); border-width:2px; }
  .layout-btn .icon{
    width:100%; height:100%;
    border-radius:0;
    background:var(--canvas-bg);
    flex-shrink:0;
    position:relative;
    overflow:hidden;
    border:1px solid var(--line);
  }
  .layout-btn .icon i{
    position:absolute;
    background:#c4beb3;
    border-radius:0;
  }
  .layout-btn.active .icon i{ background:#1a1a1a; }

  .bg-options{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  .bg-swatch{
    width:34px; height:34px;
    border-radius:0;
    border:1px solid var(--line);
    cursor:pointer;
    transition:transform .15s;
  }
  .bg-swatch:hover{ transform:translateY(-2px); }
  .bg-swatch.active{ border-color:var(--ink); border-width:2px; }
  .bg-image-swatch{
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--canvas-bg);
    cursor:pointer;
    position:relative;
    overflow:hidden;
  }
  .bg-image-swatch .bg-image-icon{
    font-family:"Playfair Display", serif;
    font-style:italic;
    font-size:18px;
    color:var(--muted);
    pointer-events:none;
  }
  .bg-image-swatch.has-image .bg-image-icon{
    display:none;
  }
  .eyedropper-swatch{
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--canvas-bg);
    cursor:pointer;
    position:relative;
    overflow:hidden;
  }
  .eyedropper-swatch .eyedropper-icon{
    width:18px; height:18px;
    color:var(--muted);
    pointer-events:none;
    display:flex;
  }
  .eyedropper-swatch .eyedropper-icon svg{
    width:100%; height:100%;
  }
  .eyedropper-swatch.has-color .eyedropper-icon{
    display:none;
  }
  .eyedropper-swatch input[type="color"]{
    position:absolute;
    top:0; left:0;
    width:100%; height:100%;
    opacity:0;
    border:none;
    padding:0;
    cursor:pointer;
  }

  .color-options{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
  }
  #extractedColors:not(:empty){
    margin-top:10px;
  }
  .color-swatch{
    width:34px; height:34px;
    border-radius:50%;
    border:1px solid var(--line);
    cursor:pointer;
    transition:transform .15s;
    position:relative;
  }
  .color-swatch:hover{ transform:translateY(-2px); }
  .color-swatch.active{ border-color:var(--ink); border-width:2px; box-shadow:0 0 0 2px var(--bg), 0 0 0 3px var(--ink); }
  .color-swatch.auto{
    background:linear-gradient(135deg, #fff 50%, #1a1a1a 50%);
  }

  .text-input-group{
    display:flex; flex-direction:column; gap:10px;
  }
  .text-input-group label{
    font-size:11px; color:var(--muted); letter-spacing:0.5px;
  }
  .text-input-group input, .text-input-group select, .text-input-group textarea{
    padding:10px 0;
    border:none;
    border-bottom:1px solid var(--line);
    border-radius:0;
    font-size:14px;
    font-family:inherit;
    background:transparent;
    color:var(--ink);
  }
  .text-input-group textarea{
    resize:vertical;
    line-height:1.5;
  }
  .text-input-group input:focus, .text-input-group select:focus, .text-input-group textarea:focus{
    outline:none;
    border-bottom-color:var(--ink);
  }

  .actions{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .panel.actions{
    border-bottom:none;
    padding-bottom:0;
  }
  .btn{
    padding:14px;
    border-radius:0;
    border:1px solid var(--ink);
    font-size:12px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    font-weight:600;
    cursor:pointer;
    transition:all .15s;
  }
  .btn:hover{ opacity:.85; }
  .btn-primary{ background:var(--ink); color:#fff; }
  .btn-secondary{ background:transparent; border:1px solid var(--ink); color:var(--ink); }
  .btn-secondary:hover{ background:var(--ink); color:#fff; }

  .canvas-wrap{
    order:1;
    width:100%;
    display:flex;
    flex-direction:column;
    align-items:center;
    gap:16px;
  }
  #canvas{
    width:100%;
    max-width:560px;
    aspect-ratio: 3/4;
    background:var(--canvas-bg);
    border-radius:0;
    box-shadow:0 16px 50px rgba(0,0,0,.10);
    position:relative;
    overflow:hidden;
    container-type: inline-size;
  }
  .cell{
    position:absolute;
    overflow:hidden;
    border-radius:2px;
    background:#d8d4ce;
    cursor:pointer;
  }
  .cell img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .cell.empty::after{
    content:'+';
    position:absolute;
    inset:0;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:24px;
    color:#aaa;
  }
  .cell .label{
    position:absolute;
    color:#fff;
    font-size:11px;
    font-weight:500;
  }
  .cell .num{
    position:absolute;
    top:6px; left:8px;
    color:#fff;
    font-size:10px;
    font-style:italic;
    font-family:"Playfair Display", serif;
  }
  .canvas-title{
    position:absolute;
    pointer-events:none;
  }

  /* Circular cells (Bubble Scatter mode) */
  .cell.circle{
    border-radius:50%;
  }

  /* Per-cell caption labels */
  .cell-caption{
    position:absolute;
    font-family:'Space Grotesk', sans-serif;
    font-size:1.4cqw;
    font-weight:400;
    letter-spacing:0.3px;
    line-height:1.3;
    pointer-events:none;
    white-space:nowrap;
  }
  .cell-caption.below{ text-align:left; }
  .cell-caption.right{ text-align:left; }
  .cell-caption.left{ text-align:right; }
  .cell-caption.above{ text-align:left; }
  .cell-caption.parens{ font-family:'Playfair Display',serif; font-style:italic; }

  /* Letter mosaic mode */
  .letter-bg-text{
    position:absolute;
    font-family:'Archivo', sans-serif;
    font-weight:900;
    font-size:14cqw;
    line-height:0.95;
    letter-spacing:-2px;
    pointer-events:none;
    z-index:1;
    text-align:left;
  }

  /* Banner text mode (Art of Noticing style) */
  .banner-words{
    position:absolute;
    z-index:5;
    display:flex;
    justify-content:space-between;
    width:100%;
    pointer-events:none;
  }
  .banner-words span{
    font-family:'Archivo', sans-serif;
    font-weight:700;
    font-size:5.2cqw;
    letter-spacing:-1px;
    color:#f4e98a;
  }

  /* Scattered word mode */
  .scatter-word{
    position:absolute;
    font-family:'Space Grotesk', sans-serif;
    font-weight:400;
    font-size:1.5cqw;
    color:#fff;
    pointer-events:none;
    z-index:5;
    line-height:1.2;
  }

  /* Justified paragraph mode */
  .justified-para{
    position:absolute;
    font-family:'Space Grotesk', 'Archivo', sans-serif;
    font-size:1.8cqw;
    text-align:justify;
    text-align-last:justify;
    color:#a8423a;
    line-height:1.55;
    pointer-events:none;
    word-spacing:0.15em;
    font-weight:400;
  }

  /* Text wrap mode */
  .wrap-text-container{
    position:absolute;
    font-family:'Cormorant Garamond','Georgia',serif;
    font-size:2.5cqw;
    line-height:1.35;
    pointer-events:none;
    overflow:hidden;
  }
  .wrap-photo{
    background:#d8d4ce;
    overflow:hidden;
    position:relative;
  }
  .wrap-photo img{
    width:100%; height:100%; object-fit:cover; display:block;
  }
  .wrap-text{
    /* legacy class kept for export logic */
    position:absolute;
    font-family:'Cormorant Garamond','Georgia',serif;
    font-size:2.2cqw;
    line-height:1.35;
    pointer-events:none;
    z-index:1;
    color:#1a1a1a;
  }
  .wrap-cell{
    z-index:2;
    box-shadow:0 0 0 4px var(--canvas-bg);
  }

  /* Fragment flow mode */
  .fragment-text{
    position:absolute;
    font-family:'Archivo','Helvetica',sans-serif;
    font-weight:700;
    font-size:5cqw;
    letter-spacing:-1px;
    pointer-events:none;
    line-height:1.1;
  }
  .fragment-text.thin{ font-weight:400; }

  /* Split title mode */
  .split-overlay-title{
    position:absolute;
    z-index:5;
    pointer-events:none;
    color:#fff;
  }
  .split-overlay-title .roman{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size:9cqw;
    line-height:0.95;
    letter-spacing:-2px;
  }
  .split-overlay-title .italic{
    font-family:'Playfair Display', serif;
    font-style:italic;
    font-weight:500;
    font-size:6.5cqw;
    line-height:1;
  }
  .split-overlay-title .small{
    font-family:'Archivo', sans-serif;
    font-weight:500;
    font-size:1.6cqw;
    letter-spacing:1px;
    text-transform:uppercase;
  }

  .hint{
    font-size:11px;
    color:var(--muted);
    text-align:center;
    max-width:480px;
    letter-spacing:0.5px;
    font-style:italic;
    font-family:"Playfair Display", serif;
  }

  /* ===== Mobile-first defaults: larger touch targets ===== */
  .btn{
    padding:16px;
    border-radius:0;
    border:1px solid var(--ink);
    font-size:13px;
    letter-spacing:1.5px;
    text-transform:uppercase;
    font-weight:600;
    cursor:pointer;
    transition:all .15s;
    min-height:50px;
  }

  .bg-swatch{
    width:40px; height:40px;
  }

  .upload-zone{
    min-height:72px;
    font-size:12px;
  }

  .text-input-group input, .text-input-group select, .text-input-group textarea{
    padding:13px 0;
    font-size:15px;
  }

  /* ===== Mobile: large preview near top, edge-to-edge ===== */
  .canvas-wrap{
    flex-direction:column;
    align-items:stretch;
    gap:12px;
    /* full-bleed: cancel .layout's horizontal padding so canvas spans full width */
    margin-left:-24px;
    margin-right:-24px;
    width:calc(100% + 48px);
  }
  .canvas-wrap #canvas{
    width:100%;
    height:auto;
    max-width:none;
    aspect-ratio:3/4;
  }
  .quick-actions{
    display:flex;
    flex-direction:row;
    gap:8px;
    padding:0 24px;
    box-sizing:border-box;
  }
  .quick-actions .btn{
    flex:1;
    min-height:50px;
    padding:0 8px;
    font-size:12px;
    letter-spacing:1px;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:4px;
    white-space:nowrap;
    overflow:hidden;
  }
  .quick-actions .btn-label{
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .canvas-wrap .hint{
    padding:0 24px;
    box-sizing:border-box;
  }

  /* ===== Desktop: horizontal split, controls left / preview right ===== */
  @media (min-width:900px){
    .layout{
      flex-direction:row;
      gap:56px;
      align-items:flex-start;
    }
    .controls{
      order:1;
      flex:1 1 0;
      max-width:480px;
      width:auto;
    }
    .canvas-wrap{
      order:2;
      flex:1 1 0;
      width:auto;
      margin-left:0;
      margin-right:0;
      position:sticky;
      top:24px;
      left:auto; right:auto;
      z-index:auto;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      gap:16px;
      padding:0;
      background:transparent;
      border-bottom:none;
      box-shadow:none;
    }
    .canvas-wrap #canvas{
      width:100%;
      height:auto;
      max-width:520px;
      box-shadow:0 16px 50px rgba(0,0,0,.10);
    }
    .quick-actions{
      flex-direction:row;
      width:100%;
      max-width:520px;
      gap:10px;
      padding:0;
    }
    .quick-actions .btn{
      min-height:auto;
      padding:14px;
      font-size:12px;
      letter-spacing:1.5px;
    }
    .canvas-wrap .hint{
      display:block;
      padding:0;
    }
    /* restore tighter desktop control sizing */
    .btn{
      padding:14px;
      font-size:12px;
      min-height:auto;
    }
    .bg-swatch{
      width:34px; height:34px;
    }
    .upload-zone{
      min-height:auto;
      padding:20px 12px;
    }
    .text-input-group input, .text-input-group select, .text-input-group textarea{
      padding:10px 0;
      font-size:14px;
    }
  }
</style>
</head>
<body>

<header>
  <div class="header-top">
    <span>LC — Tool — 2026 · Archive 01</span>
    <span>Taipei, Taiwan</span>
  </div>
  <h1>lifestyle <em>collage</em></h1>
  <p>upload your photos, let <em>composition</em> meet a little randomness — generate quiet, editorial layouts for your feed.</p>
</header>

<div class="layout">
  <div class="controls">

    <div class="panel">
      <h2><span class="num">01</span> Upload Photos<span class="chevron">⌄</span></h2>
      <div class="panel-body">
      <label class="upload-zone">
        <span class="plus">+</span>
        <span>點擊或拖曳上傳照片<br>(可多選)</span>
        <input type="file" id="fileInput" accept="image/*" multiple>
      </label>
      <div class="thumbs" id="thumbs"></div>
      </div>
    </div>

    <div class="panel">
      <h2><span class="num">02</span> Layout Style<span class="chevron">⌄</span></h2>
      <div class="panel-body">
      <div class="layout-options" id="layoutOptions"></div>
      </div>
    </div>

    <div class="panel">
      <h2><span class="num">03</span> Background<span class="chevron">⌄</span></h2>
      <div class="panel-body">
      <div class="bg-options" id="bgOptions"></div>
      <button class="btn btn-secondary" id="extractColorBtn" style="margin-top:14px;">🎨 推薦顏色</button>
      <div class="color-options" id="extractedColors"></div>
      </div>
    </div>

    <div class="panel">
      <h2><span class="num">04</span> Title Text<span class="chevron">⌄</span></h2>
      <div class="panel-body">
      <div class="text-input-group">
        <label>主標題</label>
        <input type="text" id="titleInput" placeholder="例如 lifestyle content / March dump">
        <label>字體風格</label>
        <select id="fontSelect">
          <option value="playfair-bold">Playfair Display — 經典優雅粗體</option>
          <option value="playfair-italic">Playfair Display — 斜體襯線</option>
          <option value="cormorant">Cormorant Garamond — 細緻襯線</option>
          <option value="dm-serif-italic">DM Serif — 雜誌斜體</option>
          <option value="archivo">Archivo Black — 現代極簡</option>
          <option value="space-grotesk">Space Grotesk — 幾何感</option>
          <option value="caveat">Caveat — 手寫風</option>
        </select>
        <label>文字顏色</label>
        <div class="color-options" id="colorOptions"></div>
      </div>

      <div class="text-input-group" style="margin-top:18px;">
        <label>長文字段落（套用至 Justified Paragraph / Text Wrap）</label>
        <textarea id="paragraphInput" rows="4" placeholder="輸入一段較長的文字..."></textarea>
      </div>

      <div class="text-input-group" style="margin-top:18px;">
        <label>標籤文字（每行一個，套用至各版式的標籤、說明文字）</label>
        <textarea id="labelsInput" rows="6" placeholder="每行輸入一個標籤..."></textarea>
      </div>

      <div class="text-input-group" style="margin-top:18px;">
        <label>輸入想要的氛圍 (可留空 = 隨機，套用至主標題)</label>
        <input type="text" id="moodInput" placeholder="例如：療癒 / 質感生活 / 旅行 / 工作日常">
      </div>

function generateCaption(moodInput){
  let pool = [];
  const trimmed = (moodInput || '').trim();

  if(!trimmed){
    // fully random across all
    Object.values(captionLibrary).forEach(arr => pool.push(...arr));
  } else {
    let matched = false;
    for(const [key, keywords] of Object.entries(moodKeywords)){
      if(keywords.some(kw => trimmed.includes(kw)) || trimmed.includes(key)){
        pool.push(...captionLibrary[key]);
        matched = true;
      }
    }
    if(!matched){
      // fallback: combine input as part of caption with a template
      const templates = [
        `${trimmed} diaries`,
        `${trimmed} (shot list)`,
        `today's ${trimmed}`,
        `notes on ${trimmed}`,
        `a little bit of ${trimmed}`,
        `${trimmed} dump`
      ];
      pool = templates;
    }
  }

  return pool[Math.floor(Math.random()*pool.length)];
}

// Generate a fresh set of label/tag lines matching the chosen mood
function generateLabels(moodInput){
  let pool = [];
  const trimmed = (moodInput || '').trim();

  if(!trimmed){
    Object.values(labelLibrary).forEach(arr => pool.push(...arr));
  } else {
    let matched = false;
    for(const [key, keywords] of Object.entries(moodKeywords)){
      if(keywords.some(kw => trimmed.includes(kw)) || trimmed.includes(key)){
        pool.push(...labelLibrary[key]);
        matched = true;
      }
    }
    if(!matched){
      pool = cellCaptionPool.slice();
    }
  }

  const shuffled = shuffle(pool);
  const count = Math.min(6, shuffled.length);
  return shuffled.slice(0, count);
}

});

function getParagraphText(){

function getLabelLines(){
  const raw = document.getElementById('labelsInput').value;
  const lines = raw.split('\n').map(l=>l.trim()).filter(l=>l.length>0);
  return lines.length > 0 ? lines : DEFAULT_LABELS;
}

// Cycle/repeat a word list until it reaches at least `count` items
function cycleWords(words, count){
  if(words.length === 0) return [];
  const out = [];
  for(let i=0;i<count;i++) out.push(words[i % words.length]);
  return out;
}

// Live per-cell caption text for caption-cells layouts, derived from the
// shared label pool + a persisted shuffle order (so edits to labelsInput
// apply immediately, while randomize can still reshuffle which label goes where)
function getCellCaptionText(idx, layout){
  const labels = getLabelLines();
  if(layout.numberCaptions) return `(${String(idx+1).padStart(2,'0')})`;
  const order = (cellCaptionOrder[idx] !== undefined) ? cellCaptionOrder[idx] : idx;
  const txt = labels[order % labels.length];
  return layout.parensCaption ? `( · ${txt})` : txt;
}

// Live meta-label text (small corner captions), derived from the shared
// label pool + a persisted shuffle order, same live-update behavior as above
function getMetaLabelText(posIdx){
  const labels = getLabelLines();
  const order = (metaLabelOrder[posIdx] !== undefined) ? metaLabelOrder[posIdx] : posIdx;
  return labels[order % labels.length];
}

function relativeLuminance(hex){
  hex = hex.replace('#','');
  if(hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  const r = parseInt(hex.substring(0,2),16)/255;
  const g = parseInt(hex.substring(2,4),16)/255;
  const b = parseInt(hex.substring(4,6),16)/255;
  return 0.2126*r + 0.7152*g + 0.0722*b;
}

function isLightBackground(){
  if(useCustomBgImage) return false; // assume photos are busy; default to white text
  if(useCustomBgColor && customBgColor) return relativeLuminance(customBgColor) > 0.5;
  return !!bgColors[currentBgIdx].isLight;
}

function applyCanvasBackground(canvas){
  canvas.style.backgroundImage = '';
  if(useCustomBgImage && customBgImage){
    canvas.style.backgroundImage = `url(${customBgImage})`;
    canvas.style.backgroundSize = 'cover';
    canvas.style.backgroundPosition = 'center';
    canvas.style.backgroundColor = '';
    return;
  }
  if(useCustomBgColor && customBgColor){
    canvas.style.background = customBgColor;
    return;
  }
  const bg = bgColors[currentBgIdx];
  if(bg.type === 'gradient'){
    canvas.style.background = bg.css;
  } else {
    canvas.style.background = bg.val;
  }
}

async function drawCanvasBackground(ctx, W, H){
  if(useCustomBgImage && customBgImage){
    const img = await loadImage(customBgImage);
    const imgRatio = img.width/img.height;
    const boxRatio = W/H;
    let drawW, drawH;
    if(imgRatio > boxRatio){ drawH = H; drawW = drawH*imgRatio; }
    else { drawW = W; drawH = drawW/imgRatio; }
    const ox = (W-drawW)/2, oy = (H-drawH)/2;
    ctx.drawImage(img, ox, oy, drawW, drawH);
    return;
  }
  if(useCustomBgColor && customBgColor){
    ctx.fillStyle = customBgColor;
    ctx.fillRect(0,0,W,H);
    return;
  }
  const bg = bgColors[currentBgIdx];
  if(bg.type === 'gradient'){
    let grad;
    if(bg.dir === 'diagonal'){
      grad = ctx.createLinearGradient(0, 0, W, H);
    } else if(bg.dir === 'vertical'){
      grad = ctx.createLinearGradient(0, 0, 0, H);
    } else {
      grad = ctx.createLinearGradient(0, 0, W, 0);
    }
    bg.stops.forEach(s => grad.addColorStop(s.offset, s.color));
    ctx.fillStyle = grad;
  } else {
    ctx.fillStyle = bg.val;
  }
  ctx.fillRect(0,0,W,H);
}

async function extractDominantColors(){
  const histogram = {};
  let totalPixels = 0;
  const sampleSize = 48;
  const bucket = 32; // quantize each channel to steps of 32 (8 levels per channel)
  const sampleCanvas = document.createElement('canvas');
  sampleCanvas.width = sampleSize; sampleCanvas.height = sampleSize;
  const sctx = sampleCanvas.getContext('2d');

  for(const img of uploadedImages){
    let imageEl;
    try{ imageEl = await loadImage(img.url); } catch(e){ continue; }
    sctx.clearRect(0,0,sampleSize,sampleSize);
    sctx.drawImage(imageEl, 0, 0, sampleSize, sampleSize);
    const data = sctx.getImageData(0,0,sampleSize,sampleSize).data;
    for(let i=0;i<data.length;i+=4){
      const a = data[i+3];
      if(a < 128) continue;
      const qr = Math.min(255, Math.round(data[i]/bucket)*bucket);
      const qg = Math.min(255, Math.round(data[i+1]/bucket)*bucket);
      const qb = Math.min(255, Math.round(data[i+2]/bucket)*bucket);
      const key = `${qr},${qg},${qb}`;
      histogram[key] = (histogram[key]||0) + 1;
      totalPixels++;
    }
  }

  if(totalPixels === 0) return;

  const entries = Object.entries(histogram).map(([key,count]) => {
    const [r,g,b] = key.split(',').map(Number);
    const hex = '#' + [r,g,b].map(v=>v.toString(16).padStart(2,'0')).join('');
    return {hex, count, pct: count/totalPixels};
  });

  // sort by closeness to 20% share, take top 5 candidates
  entries.sort((a,b) => Math.abs(a.pct-0.20) - Math.abs(b.pct-0.20));
  const top = entries.slice(0,5);

  const container = document.getElementById('extractedColors');
  container.innerHTML = '';
  top.forEach((c, idx) => {
    const sw = document.createElement('div');
    sw.className = 'color-swatch';
    sw.style.background = c.hex;
    sw.title = `${c.hex} · ${(c.pct*100).toFixed(0)}%`;
    sw.addEventListener('click', () => {
      container.querySelectorAll('.color-swatch').forEach(s=>s.classList.remove('active'));
      sw.classList.add('active');
      applyExtractedBgColor(c.hex);
    });
    if(idx===0) sw.classList.add('active');
    container.appendChild(sw);
  });

  // auto-apply the color closest to 20%
  applyExtractedBgColor(top[0].hex);
}

function applyExtractedBgColor(hex){
  useCustomBgImage = false;
  customBgColor = hex;
  useCustomBgColor = true;
  document.querySelectorAll('.bg-swatch, .bg-image-swatch, .eyedropper-swatch').forEach(s=>s.classList.remove('active'));
  render();
}
