function initAssignment(){
  const layout = layouts[currentLayoutIdx];
  const n = uploadedImages.length;
  if(n === 0){
    assignment = layout.cells.map(() => -1);
    cellSizes = layout.cells.map(()=>({scale:1, ox:0, oy:0}));
  } else if(n >= layout.cells.length){
    assignment = layout.cells.map((_, i) => i);
    cellSizes = layout.cells.map(()=>({scale:1, ox:0, oy:0}));
  } else {
    // fewer photos than cells: cycle through uploads, give repeats a slight random zoom/offset
    assignment = layout.cells.map((_, i) => i % n);
    cellSizes = layout.cells.map((_, i) => {
      if(i < n) return {scale:1, ox:0, oy:0};
      // repeated image: randomize crop so it doesn't look identical to its first occurrence
      return {
        scale: 1 + Math.random()*0.3,
        ox: (Math.random()-0.5)*0.25,
        oy: (Math.random()-0.5)*0.25
      };
    });
  }
  titleAreaIdx = 0;
  // show all defined meta-label positions by default so editing the shared
  // label text always has a visible effect, even before clicking Randomize
  activeMetaLabels = (layout.metaLabels || []).map((_, i) => i);
  metaLabelOrder = activeMetaLabels.map((_, i) => i);
  // reset per-cell caption order (identity mapping into the shared label pool)
  cellCaptionOrder = layout.cells.map((_, idx) => idx);
}

function shuffle(arr){
  const a = [...arr];
  for(let i=a.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

document.getElementById('randomizeBtn').addEventListener('click', () => {
  if(uploadedImages.length === 0) return;
  const layout = layouts[currentLayoutIdx];
  // shuffle which images go where
  const numCells = layout.cells.length;
  const indices = [];
  for(let i=0;i<numCells;i++){
    indices.push(i % uploadedImages.length);
  }
  assignment = shuffle(indices).map((v,i) => i < numCells ? v : -1).slice(0,numCells);
  while(assignment.length < numCells) assignment.push(-1);

  // randomize crop offsets/scale slightly
  cellSizes = layout.cells.map(() => ({
    scale: 1 + Math.random()*0.25,
    ox: (Math.random()-0.5)*0.2,
    oy: (Math.random()-0.5)*0.2
  }));

  // randomize text placement
  titleAreaIdx = layout.titleAreas.length > 0 ? Math.floor(Math.random() * layout.titleAreas.length) : 0;

  // randomize meta labels (Dutch-design micro captions): show 0 to all positions,
  // and shuffle which line from the shared label pool appears at each position
  const allMetaIdx = (layout.metaLabels || []).map((_,i)=>i);
  const metaCount = allMetaIdx.length > 0 ? 1 + Math.floor(Math.random() * allMetaIdx.length) : 0;
  activeMetaLabels = shuffle(allMetaIdx).slice(0, metaCount);
  const labelLines = getLabelLines();
  const labelIndices = labelLines.map((_, i) => i);
  const shuffledLabelIndices = shuffle(labelIndices);
  metaLabelOrder = {};
  activeMetaLabels.forEach((posIdx, i) => {
    metaLabelOrder[posIdx] = shuffledLabelIndices[i % shuffledLabelIndices.length];
  });

  // randomize per-cell caption order (which label goes on which cell)
  if(layout.mode === 'caption-cells' && !layout.numberCaptions){
    const indices = labelLines.map((_, i) => i);
    const shuffled = shuffle(indices);
    cellCaptionOrder = layout.cells.map((_, idx) => shuffled[idx % shuffled.length]);
  }

  render();
});

function render(){
  const canvas = document.getElementById('canvas');
  canvas.innerHTML = '';
  applyCanvasBackground(canvas);

  const layout = layouts[currentLayoutIdx];

  // Dispatch to mode-specific renderers for new layouts
  if(layout.mode){
    return renderMode(canvas, layout);
  }

  // Title
  const titleText = getTitleText();
  if(layout.titleAreas && layout.titleAreas.length > 0){
    const ta = layout.titleAreas[titleAreaIdx] || layout.titleAreas[0];
    const fontStyle = document.getElementById('fontSelect').value;
    const titleEl = document.createElement('div');
    titleEl.className = 'canvas-title';
    titleEl.style.left = (ta.x*100)+'%';
    titleEl.style.top = (ta.y*100)+'%';
    titleEl.style.width = (ta.w*100)+'%';
    titleEl.style.height = (ta.h*100)+'%';
    titleEl.style.display = 'flex';
    titleEl.style.alignItems = 'center';
    titleEl.style.justifyContent = ta.align==='center' ? 'center' : (ta.align==='right' ? 'flex-end':'flex-start');
    titleEl.style.textAlign = ta.align;
    titleEl.style.zIndex = ta.overlay ? '5' : '1';
    if(ta.rotate){
      titleEl.style.transform = `rotate(${ta.rotate}deg)`;
      titleEl.style.transformOrigin = ta.align==='center' ? 'center' : (ta.align==='right' ? 'right center' : 'left center');
    }

    // color: explicit override > overlay-on-photo white > auto contrast with bg
    let textColor;
    if(titleColorOverride){
      textColor = titleColorOverride;
    } else if(ta.overlay){
      textColor = '#ffffff';
    } else {
      const isLightBg = isLightBackground();
      textColor = isLightBg ? '#1a1a1a' : '#ffffff';
    }
    titleEl.style.color = textColor;

    let fontFamily = "'Archivo', sans-serif";
    let fontWeight = '800';
    let fontStyleCss = 'normal';
    let baseSize = 7; // cqw, for "large"
    let lineHeight = '1.05';
    let letterSpacing = '-1px';

    switch(fontStyle){
      case 'playfair-bold':
        fontFamily = "'Playfair Display', serif";
        fontWeight = '700';
        baseSize = 7;
        break;
      case 'playfair-italic':
        fontFamily = "'Playfair Display', serif";
        fontWeight = '600';
        fontStyleCss = 'italic';
        baseSize = 6.5;
        break;
      case 'cormorant':
        fontFamily = "'Cormorant Garamond', serif";
        fontWeight = '500';
        baseSize = 8;
        letterSpacing = '0px';
        break;
      case 'dm-serif-italic':
        fontFamily = "'DM Serif Display', serif";
        fontWeight = '400';
        fontStyleCss = 'italic';
        baseSize = 7;
        break;
      case 'archivo':
        fontFamily = "'Archivo', sans-serif";
        fontWeight = '900';
        baseSize = 7;
        break;
      case 'space-grotesk':
        fontFamily = "'Space Grotesk', sans-serif";
        fontWeight = '700';
        baseSize = 6.5;
        break;
      case 'caveat':
        fontFamily = "'Caveat', cursive";
        fontWeight = '600';
        baseSize = 7;
        letterSpacing = '0px';
        break;
    }

    // size tiers: large = main title, medium = secondary headline, small = caption-style
    let fontSize, fontWeightFinal, letterSpacingFinal;
    if(ta.size === 'small'){
      fontSize = (baseSize * 0.28) + 'cqw';
      fontWeightFinal = '500';
      lineHeight = '1.4';
      letterSpacingFinal = '1.5px';
      fontFamily = "'Space Grotesk', 'Archivo', sans-serif";
      fontStyleCss = 'normal';
    } else if(ta.size === 'medium'){
      fontSize = (baseSize * 0.5) + 'cqw';
      fontWeightFinal = fontWeight;
      lineHeight = '1.15';
      letterSpacingFinal = letterSpacing;
    } else {
      fontSize = baseSize + 'cqw';
      fontWeightFinal = fontWeight;
      letterSpacingFinal = letterSpacing;
    }

    titleEl.style.fontFamily = fontFamily;
    titleEl.style.fontWeight = fontWeightFinal;
    titleEl.style.fontStyle = fontStyleCss;
    titleEl.style.fontSize = fontSize;
    titleEl.style.lineHeight = lineHeight;
    titleEl.style.letterSpacing = letterSpacingFinal;
    titleEl.style.textTransform = ta.size === 'small' ? 'uppercase' : 'none';
    titleEl.textContent = titleText;
    canvas.appendChild(titleEl);
  }

  // Meta labels (Dutch-design micro captions, e.g. "REF — 2026")
  const layoutMeta = layout.metaLabels || [];
  activeMetaLabels.forEach(idx => {
    const ma = layoutMeta[idx];
    if(!ma) return;
    const isLightBg = isLightBackground();
    const metaEl = document.createElement('div');
    metaEl.className = 'canvas-title';
    metaEl.style.left = (ma.x*100)+'%';
    metaEl.style.top = (ma.y*100)+'%';
    metaEl.style.width = (ma.w*100)+'%';
    metaEl.style.height = (ma.h*100)+'%';
    metaEl.style.display = 'flex';
    metaEl.style.alignItems = 'center';
    metaEl.style.justifyContent = ma.align==='center' ? 'center' : (ma.align==='right' ? 'flex-end':'flex-start');
    metaEl.style.textAlign = ma.align;
    metaEl.style.color = titleColorOverride || (isLightBg ? '#1a1a1a' : '#ffffff');
    metaEl.style.fontFamily = "'Space Grotesk', 'Archivo', sans-serif";
    metaEl.style.fontWeight = '500';
    metaEl.style.fontSize = '1.6cqw';
    metaEl.style.letterSpacing = '2px';
    metaEl.style.textTransform = 'uppercase';
    metaEl.style.opacity = '0.75';
    metaEl.textContent = getMetaLabelText(idx);
    canvas.appendChild(metaEl);
  });


  // Cells
  layout.cells.forEach((cellDef, idx) => {
    const cell = document.createElement('div');
    cell.className = 'cell';
    cell.style.left = (cellDef.x*100)+'%';
    cell.style.top = (cellDef.y*100)+'%';
    cell.style.width = (cellDef.w*100)+'%';
    cell.style.height = (cellDef.h*100)+'%';

    const imgIdx = assignment[idx];
    if(imgIdx !== undefined && imgIdx >= 0 && uploadedImages[imgIdx]){
      const img = document.createElement('img');
      img.src = uploadedImages[imgIdx].url;
      const sz = cellSizes[idx] || {scale:1,ox:0,oy:0};
      img.style.transform = `scale(${sz.scale}) translate(${sz.ox*50}%, ${sz.oy*50}%)`;
      cell.appendChild(img);

      const num = document.createElement('div');
      num.className = 'num';
      num.textContent = `(${idx+1})`;
      cell.appendChild(num);
    } else {
      cell.classList.add('empty');
    }

    cell.addEventListener('click', () => {
      if(uploadedImages.length === 0) return;
      // cycle to next image
      let next = (assignment[idx] === undefined ? -1 : assignment[idx]) + 1;
      if(next >= uploadedImages.length) next = 0;
      assignment[idx] = next;
      render();
    });

    canvas.appendChild(cell);
  });
}

// ============= MODE-SPECIFIC RENDERERS =============

function renderMode(canvas, layout){
  switch(layout.mode){
    case 'caption-cells': return renderCaptionCells(canvas, layout);
    case 'letter-mosaic': return renderLetterMosaic(canvas, layout);
    case 'split-title': return renderSplitTitle(canvas, layout);
    case 'banner-text': return renderBannerText(canvas, layout);
    case 'word-scatter': return renderWordScatter(canvas, layout);
    case 'justified-para': return renderJustifiedPara(canvas, layout);
    case 'text-wrap': return renderTextWrap(canvas, layout);
    case 'fragment-flow': return renderFragmentFlow(canvas, layout);
  }
}

function helperCreateCell(cellDef, idx, opts){
  opts = opts || {};
  const cell = document.createElement('div');
  cell.className = 'cell';
  if(cellDef.shape === 'circle') cell.classList.add('circle');
  if(opts.extraClass) cell.classList.add(opts.extraClass);
  cell.style.left = (cellDef.x*100)+'%';
  cell.style.top = (cellDef.y*100)+'%';
  cell.style.width = (cellDef.w*100)+'%';
  cell.style.height = (cellDef.h*100)+'%';
  const imgIdx = assignment[idx];
  if(imgIdx !== undefined && imgIdx >= 0 && uploadedImages[imgIdx]){
    const img = document.createElement('img');
    img.src = uploadedImages[imgIdx].url;
    const sz = cellSizes[idx] || {scale:1,ox:0,oy:0};
    img.style.transform = `scale(${sz.scale}) translate(${sz.ox*50}%, ${sz.oy*50}%)`;
    cell.appendChild(img);
  } else {
    cell.classList.add('empty');
  }
  cell.addEventListener('click', () => {
    if(uploadedImages.length === 0) return;
    let next = (assignment[idx] === undefined ? -1 : assignment[idx]) + 1;
    if(next >= uploadedImages.length) next = 0;
    assignment[idx] = next;
    render();
  });
  return cell;
}

function helperGetTextColor(layout){
  if(titleColorOverride) return titleColorOverride;
  const isLightBg = isLightBackground();
  return isLightBg ? '#1a1a1a' : '#ffffff';
}

function helperRenderMetaLabels(canvas, layout){
  const layoutMeta = layout.metaLabels || [];
  const textColor = helperGetTextColor(layout);
  activeMetaLabels.forEach(idx => {
    const ma = layoutMeta[idx];
    if(!ma) return;
    const metaEl = document.createElement('div');
    metaEl.className = 'canvas-title';
    metaEl.style.left = (ma.x*100)+'%';
    metaEl.style.top = (ma.y*100)+'%';
    metaEl.style.width = (ma.w*100)+'%';
    metaEl.style.height = (ma.h*100)+'%';
    metaEl.style.display = 'flex';
    metaEl.style.alignItems = 'center';
    metaEl.style.justifyContent = ma.align==='center' ? 'center' : (ma.align==='right' ? 'flex-end':'flex-start');
    metaEl.style.textAlign = ma.align;
    metaEl.style.color = textColor;
    metaEl.style.fontFamily = "'Space Grotesk', 'Archivo', sans-serif";
    metaEl.style.fontWeight = '500';
    metaEl.style.fontSize = '1.6cqw';
    metaEl.style.letterSpacing = '2px';
    metaEl.style.textTransform = 'uppercase';
    metaEl.style.opacity = '0.75';
    metaEl.textContent = getMetaLabelText(idx);
    canvas.appendChild(metaEl);
  });
}

// Caption Cells: photos with text labels next to each (March Dump, Album, Bubble Scatter)
function renderCaptionCells(canvas, layout){
  const textColor = helperGetTextColor(layout);

  // Title in center (or as defined)
  const titleText = getTitleText();
  if(layout.titleAreas && layout.titleAreas.length > 0){
    const ta = layout.titleAreas[titleAreaIdx] || layout.titleAreas[0];
    const fontStyle = document.getElementById('fontSelect').value;
    const titleEl = document.createElement('div');
    titleEl.className = 'canvas-title';
    titleEl.style.left = (ta.x*100)+'%';
    titleEl.style.top = (ta.y*100)+'%';
    titleEl.style.width = (ta.w*100)+'%';
    titleEl.style.height = (ta.h*100)+'%';
    titleEl.style.display = 'flex';
    titleEl.style.alignItems = 'center';
    titleEl.style.justifyContent = ta.align==='center' ? 'center' : (ta.align==='right' ? 'flex-end':'flex-start');
    titleEl.style.textAlign = ta.align;
    titleEl.style.color = textColor;
    titleEl.style.lineHeight = '0.95';
    if(ta.size === 'small'){
      titleEl.style.fontFamily = "'Space Grotesk', sans-serif";
      titleEl.style.fontSize = '1.8cqw';
      titleEl.style.letterSpacing = '1px';
      titleEl.style.textTransform = 'uppercase';
      titleEl.style.fontWeight = '500';
    } else if(ta.size === 'medium'){
      const f = mapFontStyle(fontStyle);
      titleEl.style.fontFamily = f.family;
      titleEl.style.fontWeight = f.weight;
      titleEl.style.fontStyle = f.style;
      titleEl.style.fontSize = (f.scale * 4.5) + 'cqw';
      titleEl.style.letterSpacing = f.spacing;
    } else if(ta.size === 'large-serif'){
      // Force editorial serif look (March dump style) regardless of font selector
      titleEl.style.fontFamily = "'DM Serif Display','Playfair Display',serif";
      titleEl.style.fontSize = '6cqw';
      titleEl.style.lineHeight = '0.95';
      titleEl.style.letterSpacing = '-1px';
      titleEl.style.fontWeight = '400';
      // First word roman, rest italic via inline span
      const words = titleText.split(/\s+/);
      if(words.length >= 2){
        titleEl.innerHTML = `<span>${words[0]}</span><br><span style="font-style:italic;margin-left:1cqw">${words.slice(1).join(' ')}</span>`;
        titleEl.style.display = 'block';
        titleEl.style.textAlign = ta.align;
      }
    } else {
      // map font style — favor serif italic for these collage layouts
      const f = mapFontStyle(fontStyle);
      titleEl.style.fontFamily = f.family;
      titleEl.style.fontWeight = f.weight;
      titleEl.style.fontStyle = f.style;
      titleEl.style.fontSize = (f.scale * 7) + 'cqw';
      titleEl.style.letterSpacing = f.spacing;
    }
    if(ta.rotate) titleEl.style.transform = `rotate(${ta.rotate}deg)`;
    if(ta.size !== 'large-serif') titleEl.textContent = titleText;
    canvas.appendChild(titleEl);
  }

  // Cells + per-cell captions
  layout.cells.forEach((cellDef, idx) => {
    const cell = helperCreateCell(cellDef, idx);
    canvas.appendChild(cell);

    const cap = getCellCaptionText(idx, layout);
    if(cap){
      const capEl = document.createElement('div');
      capEl.className = 'cell-caption ' + (cellDef.captionPos || 'below');
      if(layout.parensCaption) capEl.classList.add('parens');
      capEl.style.color = textColor;
      capEl.textContent = cap;

      // position relative to cell
      const pos = cellDef.captionPos || 'below';
      const gap = 0.012;
      if(pos === 'below'){
        capEl.style.left = (cellDef.x*100)+'%';
        capEl.style.top = ((cellDef.y + cellDef.h + gap)*100)+'%';
        capEl.style.width = (cellDef.w*100)+'%';
        capEl.style.textAlign = 'left';
      } else if(pos === 'above'){
        capEl.style.left = (cellDef.x*100)+'%';
        capEl.style.top = ((cellDef.y - 0.035)*100)+'%';
        capEl.style.width = (cellDef.w*100)+'%';
      } else if(pos === 'right'){
        capEl.style.left = ((cellDef.x + cellDef.w + gap)*100)+'%';
        capEl.style.top = (cellDef.y*100)+'%';
        capEl.style.height = (cellDef.h*100)+'%';
        capEl.style.display = 'flex';
        capEl.style.alignItems = 'flex-start';
      } else if(pos === 'left'){
        capEl.style.right = ((1 - cellDef.x + gap)*100)+'%';
        capEl.style.top = (cellDef.y*100)+'%';
        capEl.style.textAlign = 'right';
        capEl.style.minWidth = '12%';
      }
      canvas.appendChild(capEl);
    }
  });

  helperRenderMetaLabels(canvas, layout);
}

// Letter Mosaic: huge text background with photos overlaid
function renderLetterMosaic(canvas, layout){
  const textColor = helperGetTextColor(layout);
  applyCanvasBackground(canvas);
  const variant = (layout.titleAreas[titleAreaIdx] || {}).variant || 0;
  const labels = getLabelLines();
  const titleWords = getTitleText().split(/\s+/);
  const bgLines = titleWords.length > 0 ? titleWords.slice(0,3) : layout.bgTextLines;

  // Top label
  const topLabel = document.createElement('div');
  topLabel.style.position = 'absolute';
  topLabel.style.top = '2%';
  topLabel.style.color = textColor;
  topLabel.style.fontFamily = "'Space Grotesk', sans-serif";
  topLabel.style.fontSize = '1.8cqw';
  topLabel.style.letterSpacing = '0.5px';
  topLabel.textContent = labels[0];
  if(variant === 0){
    topLabel.style.left = '50%';
    topLabel.style.transform = 'translateX(-50%)';
  } else {
    topLabel.style.right = '6%';
    topLabel.style.textAlign = 'right';
  }
  canvas.appendChild(topLabel);

  // Background huge text (derived from the main title)
  const bgText = document.createElement('div');
  bgText.className = 'letter-bg-text';
  bgText.style.color = textColor;
  bgText.style.top = '12%';
  bgText.style.width = '88%';
  if(variant === 0){
    bgText.style.left = '6%';
    bgText.style.textAlign = 'left';
  } else {
    bgText.style.left = '6%';
    bgText.style.textAlign = 'right';
  }
  bgText.innerHTML = bgLines.map(l => `<div>${l}</div>`).join('');
  canvas.appendChild(bgText);

  // Photo cells overlaying letters
  layout.cells.forEach((cellDef, idx) => {
    const cell = helperCreateCell(cellDef, idx);
    cell.style.zIndex = '3';
    cell.style.boxShadow = '0 2px 8px rgba(0,0,0,0.15)';
    canvas.appendChild(cell);
  });

  // Bottom label (from the shared label pool)
  const bottomText = labels[1 % labels.length] || labels[0];
  const bottomLabel = document.createElement('div');
  bottomLabel.style.position = 'absolute';
  bottomLabel.style.bottom = '6%';
  bottomLabel.style.color = textColor;
  bottomLabel.style.fontFamily = "'Archivo', sans-serif";
  bottomLabel.style.fontWeight = '900';
  bottomLabel.style.fontSize = '6cqw';
  bottomLabel.style.letterSpacing = '-1px';
  bottomLabel.style.zIndex = '4';
  if(variant === 0){
    bottomLabel.style.left = '50%';
    bottomLabel.style.transform = 'translateX(-50%)';
  } else {
    bottomLabel.style.right = '6%';
  }
  bottomLabel.textContent = bottomText.startsWith('(') ? bottomText : `(${bottomText})`;
  canvas.appendChild(bottomLabel);
}

// Split Title: two stacked photos with text spanning across the divide
function renderSplitTitle(canvas, layout){
  layout.cells.forEach((cellDef, idx) => {
    const cell = helperCreateCell(cellDef, idx);
    canvas.appendChild(cell);
  });

  const titleText = getTitleText();
  const fontStyle = document.getElementById('fontSelect').value;
  const ta = layout.titleAreas[titleAreaIdx] || layout.titleAreas[0];
  // Title block sitting on the split line (around y=0.36-0.66)
  const wrap = document.createElement('div');
  wrap.className = 'split-overlay-title';
  wrap.style.left = (ta.x*100)+'%'; wrap.style.top = (ta.y*100)+'%'; wrap.style.width = (ta.w*100)+'%';
  wrap.style.display = 'flex'; wrap.style.flexDirection = 'column';
  wrap.style.alignItems = ta.align === 'center' ? 'center' : 'flex-start';
  wrap.style.textAlign = ta.align === 'center' ? 'center' : 'left';
  if(titleColorOverride) wrap.style.color = titleColorOverride;
  // Split title into 2 parts: first half roman, second half italic
  const parts = titleText.split(/\s+/);
  const half = Math.ceil(parts.length / 2);
  const romanPart = parts.slice(0, half).join(' ');
  const italicPart = parts.slice(half).join(' ');

  const roman = document.createElement('div');
  roman.className = 'roman';
  roman.textContent = romanPart;
  wrap.appendChild(roman);

  if(italicPart){
    const italic = document.createElement('div');
    italic.className = 'italic';
    italic.textContent = italicPart;
    italic.style.marginTop = '0.5cqw';
    if(ta.align !== 'center') italic.style.marginLeft = '6cqw';
    wrap.appendChild(italic);
  }
  canvas.appendChild(wrap);

  helperRenderMetaLabels(canvas, layout);
}

// Banner Text: single image with horizontal text band of spread-out words
function renderBannerText(canvas, layout){
  layout.cells.forEach((cellDef, idx) => {
    const cell = helperCreateCell(cellDef, idx);
    canvas.appendChild(cell);
  });

  const variant = (layout.titleAreas[titleAreaIdx] || {}).variant || 0;
  const bannerY = variant === 1 && layout.bannerYAlt !== undefined ? layout.bannerYAlt : layout.bannerY;

  const titleWords = getTitleText().toUpperCase().split(/\s+/);
  const words = titleWords.length >= 4 ? titleWords.slice(0,4) : cycleWords(titleWords, 4);
  const band = document.createElement('div');
  band.style.position = 'absolute';
  band.style.left = '0'; band.style.right = '0';
  band.style.top = (bannerY*100)+'%';
  band.style.height = '14%';
  band.style.background = 'rgba(0,0,0,0.25)';
  band.style.zIndex = '4';
  canvas.appendChild(band);

  // Words spread horizontally
  const wrap = document.createElement('div');
  wrap.style.position = 'absolute';
  wrap.style.left = '4%'; wrap.style.right = '4%';
  wrap.style.top = (bannerY*100)+'%';
  wrap.style.height = '14%';
  wrap.style.display = 'flex';
  wrap.style.flexDirection = 'column';
  wrap.style.justifyContent = 'center';
  wrap.style.zIndex = '5';

  // arrange words in 1-2 rows depending on count
  const isFour = words.length >= 4;
  if(isFour){
    const row1 = document.createElement('div');
    row1.style.display='flex'; row1.style.justifyContent='space-between'; row1.style.width='100%';
    const w1 = document.createElement('span'); w1.textContent = words[0];
    const w2 = document.createElement('span'); w2.textContent = words[2] || '';
    [w1,w2].forEach(s=>{ s.style.fontFamily="'Archivo',sans-serif"; s.style.fontWeight='700'; s.style.fontSize='5cqw'; s.style.color=(titleColorOverride || '#f4e98a'); s.style.letterSpacing='-1px'; });
    row1.appendChild(w1); row1.appendChild(w2);

    const row2 = document.createElement('div');
    row2.style.display='flex'; row2.style.justifyContent='center'; row2.style.gap='3cqw'; row2.style.width='100%';
    const w3 = document.createElement('span'); w3.textContent = words[1] || '';
    const w4 = document.createElement('span'); w4.textContent = words[3] || '';
    [w3,w4].forEach(s=>{ s.style.fontFamily="'Archivo',sans-serif"; s.style.fontWeight='700'; s.style.fontSize='5cqw'; s.style.color=(titleColorOverride || '#f4e98a'); s.style.letterSpacing='-1px'; });
    row2.appendChild(w3); row2.appendChild(w4);
    wrap.appendChild(row1); wrap.appendChild(row2);
  } else {
    const row = document.createElement('div');
    row.style.display='flex'; row.style.justifyContent='space-between'; row.style.width='100%';
    words.forEach(w => {
      const s = document.createElement('span');
      s.textContent = w;
      s.style.fontFamily="'Archivo',sans-serif"; s.style.fontWeight='700'; s.style.fontSize='5cqw'; s.style.color=(titleColorOverride || '#f4e98a'); s.style.letterSpacing='-1px';
      row.appendChild(s);
    });
    wrap.appendChild(row);
  }
  canvas.appendChild(wrap);

  helperRenderMetaLabels(canvas, layout);
}

// Word Scatter: photos with words from title scattered at fixed positions
function renderWordScatter(canvas, layout){
  layout.cells.forEach((cellDef, idx) => {
    const cell = helperCreateCell(cellDef, idx);
    canvas.appendChild(cell);
  });

  const sourceWords = (getTitleText() + ' ' + getParagraphText()).split(/\s+/);
  const variant = (layout.titleAreas[titleAreaIdx] || {}).variant || 0;
  const posSet = (variant === 1 && layout.scatterPositionsPerCellAlt) ? layout.scatterPositionsPerCellAlt : layout.scatterPositionsPerCell;
  const positions = posSet.flat();
  const words = cycleWords(sourceWords, positions.length);

  words.forEach((w, i) => {
    const span = document.createElement('div');
    span.className = 'scatter-word';
    span.style.left = (positions[i].x * 100) + '%';
    span.style.top = (positions[i].y * 100) + '%';
    if(titleColorOverride) span.style.color = titleColorOverride;
    span.textContent = w;
    canvas.appendChild(span);
  });
}

// Justified Paragraph: justified text at top, scattered small photos below
function renderJustifiedPara(canvas, layout){
  // Photos
  layout.cells.forEach((cellDef, idx) => {
    const cell = helperCreateCell(cellDef, idx);
    canvas.appendChild(cell);
  });

  const paraText = getParagraphText();
  const variant = (layout.titleAreas[titleAreaIdx] || {}).variant || 0;
  const paraArea = (variant === 1 && layout.paraAreaAlt) ? layout.paraAreaAlt : layout.paraArea;
  const para = document.createElement('div');
  para.className = 'justified-para';
  para.style.left = (paraArea.x*100)+'%';
  para.style.top = (paraArea.y*100)+'%';
  para.style.width = (paraArea.w*100)+'%';
  if(titleColorOverride) para.style.color = titleColorOverride;
  para.textContent = paraText;
  canvas.appendChild(para);
}

// Text Wrap: narrative text with floated photos that text genuinely wraps around
function renderTextWrap(canvas, layout){
  const wrapText = getParagraphText();

  const container = document.createElement('div');
  container.className = 'wrap-text-container';
  container.style.left = (layout.textBox.x*100)+'%';
  container.style.top = (layout.textBox.y*100)+'%';
  container.style.width = (layout.textBox.w*100)+'%';
  container.style.height = (layout.textBox.h*100)+'%';
  container.style.color = helperGetTextColor(layout);

  const variant = (layout.titleAreas[titleAreaIdx] || {}).variant || 0;

  // Insert floated photo cells first - they appear in source order and float into the text
  layout.cells.forEach((cellDef, idx) => {
    const imgIdx = assignment[idx];
    const photoEl = document.createElement('div');
    photoEl.className = 'wrap-photo';
    const floatSide = variant === 1 ? (cellDef.float === 'left' ? 'right' : 'left') : cellDef.float;
    photoEl.style.float = floatSide;
    photoEl.style.width = (cellDef.w*100)+'%';
    // height: use aspect from cellDef.h relative to box
    photoEl.style.height = (cellDef.h * (layout.textBox.h / layout.textBox.w) * 100) + '%';
    // actually simpler: just set aspect via padding-bottom trick or directly
    photoEl.style.height = '0';
    photoEl.style.paddingBottom = ((cellDef.h / cellDef.w) * cellDef.w * 100) + '%';
    photoEl.style.position = 'relative';

    const mb = (cellDef.marginBottom || 0.02) * 100;
    const mr = (cellDef.marginRight || 0) * 100;
    const ml = (cellDef.marginLeft || 0) * 100;
    photoEl.style.marginBottom = mb + '%';
    if(floatSide === 'left'){
      photoEl.style.marginRight = mr + '%';
    } else {
      photoEl.style.marginLeft = ml + '%';
    }

    if(imgIdx !== undefined && imgIdx >= 0 && uploadedImages[imgIdx]){
      const img = document.createElement('img');
      img.src = uploadedImages[imgIdx].url;
      img.style.position = 'absolute';
      img.style.top = '0'; img.style.left = '0';
      img.style.width = '100%'; img.style.height = '100%';
      img.style.objectFit = 'cover';
      const sz = cellSizes[idx] || {scale:1,ox:0,oy:0};
      img.style.transform = `scale(${sz.scale}) translate(${sz.ox*50}%, ${sz.oy*50}%)`;
      photoEl.appendChild(img);
    }
    photoEl.addEventListener('click', () => {
      if(uploadedImages.length === 0) return;
      let next = (assignment[idx] === undefined ? -1 : assignment[idx]) + 1;
      if(next >= uploadedImages.length) next = 0;
      assignment[idx] = next;
      render();
    });
    photoEl.style.pointerEvents = 'auto';
    container.appendChild(photoEl);
  });

  // Text node after the floats - browser will wrap text around them
  const textNode = document.createTextNode(wrapText);
  container.appendChild(textNode);

  canvas.appendChild(container);
}

// Fragment Flow: text fragments interleaved with tiny photos
function renderFragmentFlow(canvas, layout){
  const textColor = helperGetTextColor(layout);
  const labels = getLabelLines();
  const titleWords = getTitleText().split(/\s+/);
  const baseWords = cycleWords(titleWords, 4);
  const frags = baseWords.map((w,i,arr)=>{
    if(i===0) return '(' + w;
    if(i===arr.length-1) return w + ')';
    return w;
  });

  // top label
  const top = document.createElement('div');
  top.style.position='absolute'; top.style.left='6%'; top.style.top='2%';
  top.style.color = textColor;
  top.style.fontFamily="'Space Grotesk',sans-serif";
  top.style.fontSize='1.6cqw'; top.style.letterSpacing='1px';
  top.textContent = labels[0];
  canvas.appendChild(top);

  // Photos (small, scattered)
  layout.cells.forEach((cellDef, idx) => {
    const cell = helperCreateCell(cellDef, idx);
    canvas.appendChild(cell);
  });

  // Fragments
  const variant = (layout.titleAreas[titleAreaIdx] || {}).variant || 0;
  const fragPositions = (variant === 1 && layout.fragmentPositionsAlt) ? layout.fragmentPositionsAlt : layout.fragmentPositions;
  frags.forEach((frag, i) => {
    const pos = fragPositions[i] || fragPositions[fragPositions.length-1];
    const el = document.createElement('div');
    el.className = 'fragment-text';
    el.style.left = (pos.x*100)+'%';
    el.style.top = (pos.y*100)+'%';
    el.style.color = textColor;
    el.textContent = frag;
    canvas.appendChild(el);
  });

  // Bottom label
  const bot = document.createElement('div');
  bot.style.position='absolute'; bot.style.left='6%'; bot.style.bottom='4%';
  bot.style.color = textColor;
  bot.style.fontFamily="'Space Grotesk',sans-serif";
  bot.style.fontSize='1.6cqw'; bot.style.letterSpacing='1px';
  bot.textContent = labels[1 % labels.length] || labels[0];
  canvas.appendChild(bot);
}

function mapFontStyle(fontStyle){
  switch(fontStyle){
    case 'playfair-bold': return {family:"'Playfair Display',serif",weight:'700',style:'normal',scale:1,spacing:'-1px'};
    case 'playfair-italic': return {family:"'Playfair Display',serif",weight:'600',style:'italic',scale:0.95,spacing:'-1px'};
    case 'cormorant': return {family:"'Cormorant Garamond',serif",weight:'500',style:'normal',scale:1.15,spacing:'0px'};
    case 'dm-serif-italic': return {family:"'DM Serif Display',serif",weight:'400',style:'italic',scale:1,spacing:'-1px'};
    case 'archivo': return {family:"'Archivo',sans-serif",weight:'900',style:'normal',scale:1,spacing:'-1px'};
    case 'space-grotesk': return {family:"'Space Grotesk',sans-serif",weight:'700',style:'normal',scale:0.95,spacing:'-1px'};
    case 'caveat': return {family:"'Caveat',cursive",weight:'600',style:'normal',scale:1,spacing:'0px'};
    default: return {family:"'Archivo',sans-serif",weight:'900',style:'normal',scale:1,spacing:'-1px'};
  }
}

document.getElementById('titleInput').addEventListener('input', render);
document.getElementById('fontSelect').addEventListener('change', render);

// Export
document.getElementById('exportBtn').addEventListener('click', async () => {
  if(uploadedImages.length === 0){
    alert('請先上傳照片');
    return;
  }
  await document.fonts.ready;
  const exportWidth = 1080;
  const exportHeight = 1440;

  const canvasEl = document.createElement('canvas');
  canvasEl.width = exportWidth;
  canvasEl.height = exportHeight;
  const ctx = canvasEl.getContext('2d');

  // background
  await drawCanvasBackground(ctx, exportWidth, exportHeight);

  const layout = layouts[currentLayoutIdx];

  // Dispatch to mode-specific export for new layouts
  if(layout.mode){
    await exportMode(ctx, layout, exportWidth, exportHeight);
    const link = document.createElement('a');
    link.download = 'collage.png';
    link.href = canvasEl.toDataURL('image/png');
    link.click();
    return;
  }

  // draw cells
  for(let idx=0; idx<layout.cells.length; idx++){
    const c = layout.cells[idx];
    const imgIdx = assignment[idx];
    const px = c.x*exportWidth, py = c.y*exportHeight, pw = c.w*exportWidth, ph = c.h*exportHeight;

    if(imgIdx !== undefined && imgIdx >= 0 && uploadedImages[imgIdx]){
      const img = await loadImage(uploadedImages[imgIdx].url);
      const sz = cellSizes[idx] || {scale:1,ox:0,oy:0};

      ctx.save();
      ctx.beginPath();
      ctx.rect(px, py, pw, ph);
      ctx.clip();

      // cover-fit with scale & offset
      const scale = sz.scale;
      const imgRatio = img.width/img.height;
      const cellRatio = pw/ph;
      let drawW, drawH;
      if(imgRatio > cellRatio){
        drawH = ph*scale;
        drawW = drawH*imgRatio;
      } else {
        drawW = pw*scale;
        drawH = drawW/imgRatio;
      }
      const offsetX = px + (pw-drawW)/2 + sz.ox*pw*0.5;
      const offsetY = py + (ph-drawH)/2 + sz.oy*ph*0.5;
      ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
      ctx.restore();

      // number label
      ctx.fillStyle = 'rgba(255,255,255,0.9)';
      ctx.font = 'italic 18px "Playfair Display", Georgia';
      ctx.fillText(`(${idx+1})`, px+10, py+24);
    } else {
      ctx.fillStyle = '#d8d4ce';
      ctx.fillRect(px,py,pw,ph);
    }
  }

  // draw title
  const titleText = getTitleText();
  if(true){
    const ta = layout.titleAreas[titleAreaIdx] || layout.titleAreas[0];
    const fontStyle = document.getElementById('fontSelect').value;

    let textColor;
    if(titleColorOverride){
      textColor = titleColorOverride;
    } else if(ta.overlay){
      textColor = '#ffffff';
    } else {
      const isLightBg = isLightBackground();
      textColor = isLightBg ? '#1a1a1a' : '#ffffff';
    }
    ctx.fillStyle = textColor;

    let baseSize = exportWidth*0.075;
    let fontFamily = 'Archivo';
    let fontWeight = '900';
    let fontStyleCss = 'normal';

    switch(fontStyle){
      case 'playfair-bold':
        fontFamily = 'Playfair Display'; fontWeight='700'; baseSize = exportWidth*0.075; break;
      case 'playfair-italic':
        fontFamily = 'Playfair Display'; fontWeight='600'; fontStyleCss='italic'; baseSize = exportWidth*0.07; break;
      case 'cormorant':
        fontFamily = 'Cormorant Garamond'; fontWeight='500'; baseSize = exportWidth*0.085; break;
      case 'dm-serif-italic':
        fontFamily = 'DM Serif Display'; fontWeight='400'; fontStyleCss='italic'; baseSize = exportWidth*0.075; break;
      case 'archivo':
        fontFamily = 'Archivo'; fontWeight='900'; baseSize = exportWidth*0.075; break;
      case 'space-grotesk':
        fontFamily = 'Space Grotesk'; fontWeight='700'; baseSize = exportWidth*0.07; break;
      case 'caveat':
        fontFamily = 'Caveat'; fontWeight='600'; baseSize = exportWidth*0.075; break;
    }

    let fontSize, fontWeightFinal, letterSpacingFinal, useUppercase;
    if(ta.size === 'small'){
      fontSize = baseSize * 0.28;
      fontWeightFinal = '500';
      fontFamily = 'Space Grotesk';
      fontStyleCss = 'normal';
      letterSpacingFinal = fontSize * 0.06;
      useUppercase = true;
    } else if(ta.size === 'medium'){
      fontSize = baseSize * 0.5;
      fontWeightFinal = fontWeight;
      letterSpacingFinal = 0;
      useUppercase = false;
    } else {
      fontSize = baseSize;
      fontWeightFinal = fontWeight;
      letterSpacingFinal = 0;
      useUppercase = false;
    }

    ctx.font = `${fontStyleCss} ${fontWeightFinal} ${fontSize}px "${fontFamily}"`;
    if(ctx.letterSpacing !== undefined) ctx.letterSpacing = letterSpacingFinal + 'px';

    const tx = ta.x*exportWidth;
    const ty = ta.y*exportHeight;
    const tw = ta.w*exportWidth;

    ctx.textAlign = ta.align === 'center' ? 'center' : (ta.align === 'right' ? 'right':'left');
    let drawX = tx;
    if(ta.align==='center') drawX = tx + tw/2;
    if(ta.align==='right') drawX = tx + tw;

    // wrap text
    const displayText = useUppercase ? titleText.toUpperCase() : titleText;
    const words = displayText.split(' ');
    const lines = [];
    let line = '';
    for(const word of words){
      const test = line ? line+' '+word : word;
      if(ctx.measureText(test).width > tw && line){
        lines.push(line);
        line = word;
      } else {
        line = test;
      }
    }
    if(line) lines.push(line);

    const lineHeight = ta.size === 'small' ? fontSize*1.4 : (ta.size === 'medium' ? fontSize*1.15 : fontSize*1.1);

    ctx.save();
    if(ta.rotate){
      // rotate around the anchor point (drawX, vertical center of text block)
      const blockHeight = lineHeight * lines.length;
      const anchorY = ty + blockHeight/2;
      ctx.translate(drawX, anchorY);
      ctx.rotate(ta.rotate * Math.PI/180);
      ctx.translate(-drawX, -anchorY);
    }

    let lineY = ty + fontSize;
    lines.forEach(l => {
      ctx.fillText(l, drawX, lineY);
      lineY += lineHeight;
    });
    ctx.restore();
    if(ctx.letterSpacing !== undefined) ctx.letterSpacing = '0px';
  }

  // draw meta labels (Dutch-design micro captions)
  const layoutMeta = layout.metaLabels || [];
  activeMetaLabels.forEach(idx => {
    const ma = layoutMeta[idx];
    if(!ma) return;
    const text = getMetaLabelText(idx);
    const isLightBg = isLightBackground();
    if(titleColorOverride){
      ctx.fillStyle = hexToRgba(titleColorOverride, 0.75);
    } else {
      ctx.fillStyle = isLightBg ? 'rgba(26,26,26,0.75)' : 'rgba(255,255,255,0.75)';
    }
    const metaFontSize = exportWidth * 0.016;
    ctx.font = `500 ${metaFontSize}px "Space Grotesk"`;
    if(ctx.letterSpacing !== undefined) ctx.letterSpacing = (metaFontSize*0.15) + 'px';

    const mx = ma.x*exportWidth;
    const my = ma.y*exportHeight;
    const mw = ma.w*exportWidth;

    ctx.textAlign = ma.align === 'center' ? 'center' : (ma.align === 'right' ? 'right':'left');
    let mdrawX = mx;
    if(ma.align==='center') mdrawX = mx + mw/2;
    if(ma.align==='right') mdrawX = mx + mw;

    ctx.fillText(text, mdrawX, my + metaFontSize);
    if(ctx.letterSpacing !== undefined) ctx.letterSpacing = '0px';
  });

  // download
  const link = document.createElement('a');
  link.download = 'collage.png';
  link.href = canvasEl.toDataURL('image/png');
  link.click();
});

// ============= EXPORT CANVAS RENDERERS FOR NEW MODES =============

async function exportMode(ctx, layout, W, H){
  switch(layout.mode){
    case 'caption-cells': return await exportCaptionCells(ctx, layout, W, H);
    case 'letter-mosaic': return await exportLetterMosaic(ctx, layout, W, H);
    case 'split-title':   return await exportSplitTitle(ctx, layout, W, H);
    case 'banner-text':   return await exportBannerText(ctx, layout, W, H);
    case 'word-scatter':  return await exportWordScatter(ctx, layout, W, H);
    case 'justified-para':return await exportJustifiedPara(ctx, layout, W, H);
    case 'text-wrap':     return await exportTextWrap(ctx, layout, W, H);
    case 'fragment-flow': return await exportFragmentFlow(ctx, layout, W, H);
  }
}

function getCtxTextColor(){
  if(titleColorOverride) return titleColorOverride;
  const isLightBg = isLightBackground();
  return isLightBg ? '#1a1a1a' : '#ffffff';
}

function hexToRgba(hex, alpha){
  hex = hex.replace('#','');
  if(hex.length === 3) hex = hex.split('').map(c=>c+c).join('');
  const r = parseInt(hex.substring(0,2),16);
  const g = parseInt(hex.substring(2,4),16);
  const b = parseInt(hex.substring(4,6),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

async function drawCellImage(ctx, layout, cellDef, idx, W, H){
  const px = cellDef.x*W, py = cellDef.y*H, pw = cellDef.w*W, ph = cellDef.h*H;
  const imgIdx = assignment[idx];
  if(imgIdx === undefined || imgIdx < 0 || !uploadedImages[imgIdx]){
    ctx.fillStyle = '#d8d4ce';
    if(cellDef.shape === 'circle'){
      ctx.beginPath();
      ctx.ellipse(px+pw/2, py+ph/2, pw/2, ph/2, 0, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.fillRect(px,py,pw,ph);
    }
    return;
  }
  const img = await loadImage(uploadedImages[imgIdx].url);
  const sz = cellSizes[idx] || {scale:1,ox:0,oy:0};
  ctx.save();
  if(cellDef.shape === 'circle'){
    ctx.beginPath();
    ctx.ellipse(px+pw/2, py+ph/2, pw/2, ph/2, 0, 0, Math.PI*2);
    ctx.clip();
  } else {
    ctx.beginPath();
    ctx.rect(px, py, pw, ph);
    ctx.clip();
  }
  const scale = sz.scale;
  const imgRatio = img.width/img.height;
  const cellRatio = pw/ph;
  let drawW, drawH;
  if(imgRatio > cellRatio){ drawH = ph*scale; drawW = drawH*imgRatio; }
  else { drawW = pw*scale; drawH = drawW/imgRatio; }
  const offsetX = px + (pw-drawW)/2 + sz.ox*pw*0.5;
  const offsetY = py + (ph-drawH)/2 + sz.oy*ph*0.5;
  ctx.drawImage(img, offsetX, offsetY, drawW, drawH);
  ctx.restore();
}

function drawMetaLabels(ctx, layout, W, H){
  const color = getCtxTextColor();
  const layoutMeta = layout.metaLabels || [];
  activeMetaLabels.forEach(idx => {
    const ma = layoutMeta[idx];
    if(!ma) return;
    const text = getMetaLabelText(idx);
    ctx.fillStyle = color === '#1a1a1a' ? 'rgba(26,26,26,0.75)' : 'rgba(255,255,255,0.75)';
    const fs = W * 0.016;
    ctx.font = `500 ${fs}px "Space Grotesk"`;
    if(ctx.letterSpacing !== undefined) ctx.letterSpacing = (fs*0.15)+'px';
    const mx = ma.x*W, my = ma.y*H, mw = ma.w*W;
    ctx.textAlign = ma.align === 'center' ? 'center' : (ma.align === 'right' ? 'right':'left');
    let dx = mx;
    if(ma.align==='center') dx = mx+mw/2;
    if(ma.align==='right') dx = mx+mw;
    ctx.fillText(text, dx, my+fs);
    if(ctx.letterSpacing !== undefined) ctx.letterSpacing = '0px';
  });
}

async function exportCaptionCells(ctx, layout, W, H){
  // Cells
  for(let idx=0; idx<layout.cells.length; idx++){
    await drawCellImage(ctx, layout, layout.cells[idx], idx, W, H);
  }

  const color = getCtxTextColor();

  // Title
  const titleText = getTitleText();
  if(layout.titleAreas && layout.titleAreas.length > 0){
    const ta = layout.titleAreas[titleAreaIdx] || layout.titleAreas[0];
    const fontStyle = document.getElementById('fontSelect').value;
    ctx.fillStyle = color;
    let fs, family='Archivo', weight='900', style='normal';
    let titleHandled = false;
    if(ta.size === 'small'){
      fs = W*0.018; family='Space Grotesk'; weight='500';
      if(ctx.letterSpacing !== undefined) ctx.letterSpacing = '1px';
    } else if(ta.size === 'large-serif'){
      // Big editorial serif (March dump look) — mixed roman/italic
      // Match DOM's font-size: '6cqw' (6% of canvas width)
      fs = W*0.06;
      family='DM Serif Display';
      weight='400';
      ctx.font = `${weight} ${fs}px "${family}"`;
      const tx = ta.x*W, ty = ta.y*H, tw = ta.w*W;
      const drawX = ta.align==='center' ? tx+tw/2 : (ta.align==='right' ? tx+tw : tx);
      ctx.textAlign = ta.align==='center' ? 'center' : (ta.align==='right' ? 'right':'left');
      const words = titleText.split(/\s+/);
      const firstLine = words[0];
      const restLine = words.slice(1).join(' ');
      ctx.save();
      if(ta.rotate){
        const cy = ty + fs;
        ctx.translate(drawX, cy);
        ctx.rotate(ta.rotate*Math.PI/180);
        ctx.translate(-drawX, -cy);
      }
      ctx.fillText(firstLine, drawX, ty + fs);
      if(restLine){
        ctx.font = `italic 400 ${fs}px "${family}"`;
        const indentX = ta.align==='center' ? drawX : drawX + W*0.02;
        ctx.fillText(restLine, indentX, ty + fs + fs*0.95);
      }
      ctx.restore();
      titleHandled = true;
    } else if(ta.size === 'medium'){
      const f = mapFontStyle(fontStyle);
      fs = W * 0.045 * f.scale;
      family = f.family.split(',')[0].replace(/['"]/g,'').trim();
      weight = f.weight;
      style = f.style;
    } else {
      const f = mapFontStyle(fontStyle);
      fs = W * 0.07 * f.scale;
      family = f.family.split(',')[0].replace(/['"]/g,'').trim();
      weight = f.weight;
      style = f.style;
    }

    if(!titleHandled){
    ctx.font = `${style} ${weight} ${fs}px "${family}"`;
    const tx = ta.x*W, ty = ta.y*H, tw = ta.w*W, th = ta.h*H;
    ctx.textAlign = ta.align==='center' ? 'center' : (ta.align==='right' ? 'right' : 'left');
    let drawX = tx;
    if(ta.align==='center') drawX = tx+tw/2;
    if(ta.align==='right') drawX = tx+tw;

    let displayText = ta.size === 'small' ? titleText.toUpperCase() : titleText;
    const words = displayText.split(' ');
    const lines = [];
    let line = '';
    for(const word of words){
      const test = line ? line+' '+word : word;
      if(ctx.measureText(test).width > tw && line){ lines.push(line); line=word; }
      else { line = test; }
    }
    if(line) lines.push(line);

    ctx.save();
    if(ta.rotate){
      const bh = fs*1.1*lines.length;
      ctx.translate(drawX, ty+bh/2);
      ctx.rotate(ta.rotate*Math.PI/180);
      ctx.translate(-drawX, -(ty+bh/2));
    }
    let ly = ty+fs;
    lines.forEach(l => { ctx.fillText(l, drawX, ly); ly += fs*1.05; });
    ctx.restore();
    if(ctx.letterSpacing !== undefined) ctx.letterSpacing = '0px';
    }
  }

  // Per-cell captions
  ctx.fillStyle = color;
  layout.cells.forEach((cellDef, idx) => {
    const cap = getCellCaptionText(idx, layout);
    if(!cap) return;
    const fs = W * 0.014;
    const family = layout.parensCaption ? 'Playfair Display' : 'Space Grotesk';
    const style = layout.parensCaption ? 'italic' : 'normal';
    ctx.font = `${style} 400 ${fs}px "${family}"`;
    const pos = cellDef.captionPos || 'below';
    const gap = 0.012;
    const px = cellDef.x*W, py = cellDef.y*H, pw = cellDef.w*W, ph = cellDef.h*H;
    if(pos === 'below'){
      ctx.textAlign = 'left';
      ctx.fillText(cap, px, py+ph+gap*H+fs);
    } else if(pos === 'above'){
      ctx.textAlign = 'left';
      ctx.fillText(cap, px, py-gap*H);
    } else if(pos === 'right'){
      ctx.textAlign = 'left';
      ctx.fillText(cap, px+pw+gap*W, py+fs);
    } else if(pos === 'left'){
      ctx.textAlign = 'right';
      ctx.fillText(cap, px-gap*W, py+fs);
    }
  });

  drawMetaLabels(ctx, layout, W, H);
}

async function exportLetterMosaic(ctx, layout, W, H){
  const color = getCtxTextColor();
  const variant = (layout.titleAreas[titleAreaIdx] || {}).variant || 0;
  const labels = getLabelLines();
  const titleWords = getTitleText().split(/\s+/);
  const bgLines = titleWords.length > 0 ? titleWords.slice(0,3) : layout.bgTextLines;

  // Top label
  ctx.fillStyle = color;
  ctx.font = `400 ${W*0.018}px "Space Grotesk"`;
  if(variant === 0){
    ctx.textAlign = 'center';
    ctx.fillText(labels[0], W/2, H*0.04);
  } else {
    ctx.textAlign = 'right';
    ctx.fillText(labels[0], W*0.94, H*0.04);
  }

  // Background huge text (matching CSS 14cqw, derived from main title)
  const bgFontSize = W*0.14;
  ctx.font = `900 ${bgFontSize}px "Archivo"`;
  let ly = H*0.14 + bgFontSize*0.8;
  if(variant === 0){
    ctx.textAlign = 'left';
    bgLines.forEach(line => {
      ctx.fillText(line, W*0.06, ly);
      ly += bgFontSize*0.95;
    });
  } else {
    ctx.textAlign = 'right';
    bgLines.forEach(line => {
      ctx.fillText(line, W*0.94, ly);
      ly += bgFontSize*0.95;
    });
  }

  // Photo cells
  for(let idx=0; idx<layout.cells.length; idx++){
    await drawCellImage(ctx, layout, layout.cells[idx], idx, W, H);
  }

  // Bottom label (from shared label pool)
  const bottomText = labels[1 % labels.length] || labels[0];
  ctx.font = `900 ${W*0.06}px "Archivo"`;
  ctx.fillStyle = color;
  const bottomTxt = bottomText.startsWith('(') ? bottomText : `(${bottomText})`;
  if(variant === 0){
    ctx.textAlign = 'center';
    ctx.fillText(bottomTxt, W/2, H*0.92);
  } else {
    ctx.textAlign = 'right';
    ctx.fillText(bottomTxt, W*0.94, H*0.92);
  }
}

async function exportSplitTitle(ctx, layout, W, H){
  for(let idx=0; idx<layout.cells.length; idx++){
    await drawCellImage(ctx, layout, layout.cells[idx], idx, W, H);
  }
  const titleText = getTitleText();
  const parts = titleText.split(/\s+/);
  const half = Math.ceil(parts.length/2);
  const romanPart = parts.slice(0, half).join(' ');
  const italicPart = parts.slice(half).join(' ');
  const ta = layout.titleAreas[titleAreaIdx] || layout.titleAreas[0];

  ctx.fillStyle = titleColorOverride || '#ffffff';
  const tx = ta.x*W, ty = ta.y*H, tw = ta.w*W;
  const romanFs = W*0.09, italicFs = W*0.065;
  if(ta.align === 'center'){
    ctx.textAlign = 'center';
    const drawX = tx + tw/2;
    ctx.font = `700 ${romanFs}px "Playfair Display"`;
    ctx.fillText(romanPart, drawX, ty + romanFs);
    if(italicPart){
      ctx.font = `italic 500 ${italicFs}px "Playfair Display"`;
      ctx.fillText(italicPart, drawX, ty + romanFs + italicFs*1.15);
    }
  } else {
    ctx.textAlign = 'left';
    ctx.font = `700 ${romanFs}px "Playfair Display"`;
    ctx.fillText(romanPart, tx, ty + romanFs);
    if(italicPart){
      ctx.font = `italic 500 ${italicFs}px "Playfair Display"`;
      ctx.fillText(italicPart, tx + W*0.06, ty + romanFs + italicFs*1.15);
    }
  }
  drawMetaLabels(ctx, layout, W, H);
}

async function exportBannerText(ctx, layout, W, H){
  for(let idx=0; idx<layout.cells.length; idx++){
    await drawCellImage(ctx, layout, layout.cells[idx], idx, W, H);
  }
  const variant = (layout.titleAreas[titleAreaIdx] || {}).variant || 0;
  const bannerY = variant === 1 && layout.bannerYAlt !== undefined ? layout.bannerYAlt : layout.bannerY;

  // band
  ctx.fillStyle = 'rgba(0,0,0,0.25)';
  ctx.fillRect(0, bannerY*H, W, H*0.14);

  const titleWords = getTitleText().toUpperCase().split(/\s+/);
  const words = titleWords.length >= 4 ? titleWords.slice(0,4) : cycleWords(titleWords, 4);

  ctx.fillStyle = titleColorOverride || '#f4e98a';
  ctx.font = `700 ${W*0.05}px "Archivo"`;
  const bandTop = bannerY*H;
  const bandH = H*0.14;
  if(words.length >= 4){
    ctx.textAlign = 'left';  ctx.fillText(words[0], W*0.04, bandTop + bandH*0.42);
    ctx.textAlign = 'right'; ctx.fillText(words[2] || '', W*0.96, bandTop + bandH*0.42);
    ctx.textAlign = 'center';
    ctx.fillText((words[1] || '') + '   ' + (words[3] || ''), W*0.5, bandTop + bandH*0.88);
  } else {
    const segW = W*0.92 / Math.max(words.length-1, 1);
    words.forEach((w, i) => {
      ctx.textAlign = i === 0 ? 'left' : (i === words.length-1 ? 'right' : 'center');
      const wx = i === 0 ? W*0.04 : (i === words.length-1 ? W*0.96 : W*0.04 + segW*i);
      ctx.fillText(w, wx, bandTop + bandH*0.65);
    });
  }
  drawMetaLabels(ctx, layout, W, H);
}

async function exportWordScatter(ctx, layout, W, H){
  for(let idx=0; idx<layout.cells.length; idx++){
    await drawCellImage(ctx, layout, layout.cells[idx], idx, W, H);
  }
  const sourceWords = (getTitleText() + ' ' + getParagraphText()).split(/\s+/);
  const variant = (layout.titleAreas[titleAreaIdx] || {}).variant || 0;
  const posSet = (variant === 1 && layout.scatterPositionsPerCellAlt) ? layout.scatterPositionsPerCellAlt : layout.scatterPositionsPerCell;
  const positions = posSet.flat();
  const words = cycleWords(sourceWords, positions.length);
  ctx.fillStyle = titleColorOverride || '#ffffff';
  ctx.font = `400 ${W*0.015}px "Space Grotesk"`;
  ctx.textAlign = 'left';
  words.forEach((w, i) => {
    ctx.fillText(w, positions[i].x*W, positions[i].y*H + W*0.015);
  });
}

async function exportJustifiedPara(ctx, layout, W, H){
  for(let idx=0; idx<layout.cells.length; idx++){
    await drawCellImage(ctx, layout, layout.cells[idx], idx, W, H);
  }
  const paraText = getParagraphText();
  const variant = (layout.titleAreas[titleAreaIdx] || {}).variant || 0;
  const paraArea = (variant === 1 && layout.paraAreaAlt) ? layout.paraAreaAlt : layout.paraArea;
  const fs = W * 0.018;
  ctx.font = `400 ${fs}px "Space Grotesk"`;
  ctx.fillStyle = titleColorOverride || '#a8423a';
  ctx.textAlign = 'left';
  // Layout justified text by simple word-spacing
  const words = paraText.split(/\s+/);
  const boxX = paraArea.x*W;
  const boxW = paraArea.w*W;
  const lineH = fs * 1.5;
  // Build lines greedily
  const lines = [];
  let cur = [];
  let curW = 0;
  const spaceW = ctx.measureText(' ').width;
  for(const w of words){
    const ww = ctx.measureText(w).width;
    if(curW + ww + (cur.length?spaceW:0) > boxW && cur.length){
      lines.push(cur);
      cur = [w]; curW = ww;
    } else {
      cur.push(w); curW += ww + (cur.length>1?spaceW:0);
    }
  }
  if(cur.length) lines.push(cur);

  let ly = paraArea.y*H + fs;
  lines.forEach((lineWords, li) => {
    if(lineWords.length === 1 || li === lines.length-1){
      // last line — also justify per the visual
      const total = lineWords.reduce((s,w)=>s+ctx.measureText(w).width,0);
      const gap = lineWords.length > 1 ? (boxW - total) / (lineWords.length-1) : 0;
      let x = boxX;
      lineWords.forEach(w => { ctx.fillText(w, x, ly); x += ctx.measureText(w).width + gap; });
    } else {
      const total = lineWords.reduce((s,w)=>s+ctx.measureText(w).width,0);
      const gap = (boxW - total) / (lineWords.length-1);
      let x = boxX;
      lineWords.forEach(w => { ctx.fillText(w, x, ly); x += ctx.measureText(w).width + gap; });
    }
    ly += lineH;
  });
}

async function exportTextWrap(ctx, layout, W, H){
  const color = getCtxTextColor();
  const wrapText = getParagraphText();

  // Simulate floated photos: layout cells in vertical order, alternating L/R, computing exclusion zones per line
  const boxX = layout.textBox.x * W;
  const boxY = layout.textBox.y * H;
  const boxW = layout.textBox.w * W;
  const boxH = layout.textBox.h * H;
  const fs = W * 0.025;
  const lineH = fs * 1.35;
  ctx.font = `400 ${fs}px "Cormorant Garamond"`;
  ctx.fillStyle = color;
  ctx.textAlign = 'left';

  // Compute each cell's pixel rect — stacking floats vertically based on float side
  // Approximation: each float occupies its w% × h% (where h is interpreted as fraction of box width for aspect)
  const variant = (layout.titleAreas[titleAreaIdx] || {}).variant || 0;
  let leftCursorY = boxY, rightCursorY = boxY;
  const floats = layout.cells.map((c, idx) => {
    const fw = c.w * boxW;
    const fh = (c.h / c.w) * fw; // maintain aspect using w/h ratio
    const side = variant === 1 ? (c.float === 'left' ? 'right' : 'left') : c.float;
    let fx, fy;
    if(side === 'left'){
      fx = boxX;
      fy = leftCursorY;
      leftCursorY = fy + fh + (c.marginBottom || 0.02) * boxH;
    } else {
      fx = boxX + boxW - fw;
      fy = rightCursorY;
      rightCursorY = fy + fh + (c.marginBottom || 0.02) * boxH;
    }
    return {idx, x:fx, y:fy, w:fw, h:fh, side:side};
  });

  // Draw floats first
  for(const f of floats){
    const c = layout.cells[f.idx];
    await drawCellImage(ctx, layout, {x:f.x/W, y:f.y/H, w:f.w/W, h:f.h/H, shape:'rect'}, f.idx, W, H);
  }

  // Compute available x-range for each line
  function availableX(y){
    let xStart = boxX;
    let xEnd = boxX + boxW;
    for(const f of floats){
      if(y >= f.y && y < f.y + f.h){
        if(f.side === 'left') xStart = Math.max(xStart, f.x + f.w + boxW*0.02);
        else xEnd = Math.min(xEnd, f.x - boxW*0.02);
      }
    }
    return {xStart, xEnd, width: xEnd - xStart};
  }

  // Render text line by line, wrapping based on available width
  const words = wrapText.split(/\s+/);
  let wi = 0;
  let y = boxY + fs;
  while(wi < words.length && y < boxY + boxH){
    const {xStart, width} = availableX(y);
    if(width < fs*2){ y += lineH; continue; }
    // greedy line build
    let line = '';
    while(wi < words.length){
      const test = line ? line + ' ' + words[wi] : words[wi];
      if(ctx.measureText(test).width > width && line) break;
      line = test; wi++;
    }
    ctx.fillText(line, xStart, y);
    y += lineH;
  }
}

async function exportFragmentFlow(ctx, layout, W, H){
  const color = getCtxTextColor();
  ctx.fillStyle = color;
  const labels = getLabelLines();

  // top label
  ctx.font = `400 ${W*0.016}px "Space Grotesk"`;
  ctx.textAlign = 'left';
  ctx.fillText(labels[0], W*0.06, H*0.04);

  // Photos
  for(let idx=0; idx<layout.cells.length; idx++){
    await drawCellImage(ctx, layout, layout.cells[idx], idx, W, H);
  }

  // Fragments (derived from main title, cycled to 4 words)
  const titleWords = getTitleText().split(/\s+/);
  const baseWords = cycleWords(titleWords, 4);
  const frags = baseWords.map((w,i,arr)=>{
    if(i===0) return '(' + w;
    if(i===arr.length-1) return w + ')';
    return w;
  });

  ctx.font = `700 ${W*0.05}px "Archivo"`;
  ctx.fillStyle = color;
  const variant = (layout.titleAreas[titleAreaIdx] || {}).variant || 0;
  const fragPositions = (variant === 1 && layout.fragmentPositionsAlt) ? layout.fragmentPositionsAlt : layout.fragmentPositions;
  frags.forEach((frag, i) => {
    const pos = fragPositions[i] || fragPositions[fragPositions.length-1];
    ctx.fillText(frag, pos.x*W, pos.y*H + W*0.05*0.85);
  });

  // bottom label
  ctx.font = `400 ${W*0.016}px "Space Grotesk"`;
  ctx.fillStyle = color;
  ctx.fillText(labels[1 % labels.length] || labels[0], W*0.06, H*0.96);
}

function loadImage(src){
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

document.getElementById('labelsInput').value = DEFAULT_LABELS.join('\n');
document.getElementById('paragraphInput').addEventListener('input', render);
document.getElementById('labelsInput').addEventListener('input', render);
initAssignment();
render();
